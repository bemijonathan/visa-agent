services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: visa_agent
      POSTGRES_PASSWORD: visa_agent_dev
      POSTGRES_DB: visa_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visa_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  firebase:
    build:
      context: ./firebase
      dockerfile: Dockerfile
    ports:
      - "9099:9099"
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9099/"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
