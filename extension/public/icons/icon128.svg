  <rect x="40" y="58" width="24" height="4" rx="2" fill="#3b82f6" fill-opacity="0.4"/>
  <rect x="40" y="68" width="28" height="4" rx="2" fill="#3b82f6" fill-opacity="0.3"/>

  <!-- Checkmark circle -->
