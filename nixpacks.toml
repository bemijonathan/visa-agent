# Railway build config - builds dashboard then backend
[phases.setup]
nixPkgs = ["bun", "nodejs_20"]

[phases.install]
cmds = [
    "cd dashboard && bun install",
    "cd backend && bun install"
]

[phases.build]
cmds = [
    "cd backend && bunx prisma generate",
    "cd dashboard && bun run build"
]

[start]
cmd = "cd backend && bunx prisma db push --skip-generate --accept-data-loss || echo 'DB push skipped' && bunx tsx src/index.ts"
